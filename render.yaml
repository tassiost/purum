services:
  - type: web
    name: purum
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: purum2026
      - key: SESSION_SECRET
        generateValue: true
